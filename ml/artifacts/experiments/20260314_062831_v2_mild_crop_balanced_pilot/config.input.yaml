run:
  name: v2_mild_crop_balanced_pilot
  seed: 20260212
  notes: Pilot run for mild crop + balanced weighting.
  tags: [v2, pilot, mild_crop, balanced_weighting, binary]

data:
  label_source: manual_only
  target_type: binary
  binary_threshold: 4.0
  min_rating_count: 1
  splits:
    seed: 20260212
    train_pct: 70
    val_pct: 15
    test_pct: 15

model:
  name: resnet18
  epochs: 3
  batch_size: 32
  learning_rate: 0.0001

imbalance:
  class_weighting: balanced
  sampler: none
  manual_weights: {}

augmentation:
  profile: light

cropping:
  strategy: random_resized
  scale_min: 0.95
  scale_max: 1.0

performance:
  num_workers: 0
  pin_memory: false
  prefetch_factor: 2
  persistent_workers: false

subset:
  max_train_samples: 0
  max_val_samples: 0

image_cache:
  enabled: false
  cache_dir: ml/artifacts/image_cache
  precache: false

metrics:
  decision_threshold: 0.5
  threshold_sweep: true
  threshold_sweep_start: 0.1
  threshold_sweep_end: 0.9
  threshold_sweep_step: 0.1
