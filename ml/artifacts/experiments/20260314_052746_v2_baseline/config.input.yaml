run:
  name: v2_baseline
  seed: 20260212
  notes: Baseline binary run with light augmentation and random resized crop.
  tags: [baseline, binary]

data:
  label_source: manual_only
  target_type: binary
  binary_threshold: 4.0
  min_rating_count: 2
  splits:
    seed: 20260212
    train_pct: 70
    val_pct: 15
    test_pct: 15

model:
  name: resnet18
  epochs: 10
  batch_size: 32
  learning_rate: 0.0001

imbalance:
  class_weighting: none
  sampler: none
  manual_weights:
    neg: null
    pos: null

augmentation:
  profile: light

cropping:
  strategy: random_resized
  scale_min: 0.8
  scale_max: 1.0

metrics:
  decision_threshold: 0.5
  threshold_sweep: false
  threshold_sweep_start: 0.1
  threshold_sweep_end: 0.9
  threshold_sweep_step: 0.1
